name: Workflow CI MLflow

on:
  push:
    branches:
      - master # Robot akan bekerja setiap kali ada perubahan di branch master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Create py alias for Linux compatibility
        run: |
          echo "alias py=python" >> $HOME/.bashrc
          echo "alias py=python" >> $HOME/.bash_profile
          sudo ln -s $(which python) /usr/local/bin/py || true
          echo "Python version:"
          python --version
          echo "Checking py alias:"
          which py || echo "py not in PATH, but alias is set"

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn dagshub

      - name: Set MLflow Tracking URI and Run ID
        run: |
          echo "RUN_ID=e329253411a944c4aafcfa28d1e7588d" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=file:./MLProject/mlruns" >> $GITHUB_ENV

      - name: Verify Artifact Exists
        run: |
          echo "Checking MLflow runs directory..."
          echo "Looking for Run ID: ${{ env.RUN_ID }}"
          
          if [ -d "MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model" ]; then
            echo "✓ Model artifacts found"
            ls -la "MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model/"
            echo "✓ MLmodel file exists"
            cat "MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model/MLmodel"
          else
            echo "⚠ Model artifacts directory not found"
            echo "Available runs:"
            find MLProject/mlruns -type f -name "MLmodel" 2>/dev/null || echo "No MLmodel files found"
            exit 1
          fi

      - name: Upload Artefak Model ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/mlruns/

      - name: Build dan Push Docker Image
        continue-on-error: true
        run: |
          # Model path
          MODEL_PATH="MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model"
          ABSOLUTE_MODEL_PATH="$(pwd)/$MODEL_PATH"
          
          echo "Using Run ID: ${{ env.RUN_ID }}"
          echo "Model path: $ABSOLUTE_MODEL_PATH"

          # Check if model exists
          if [ ! -d "$ABSOLUTE_MODEL_PATH" ]; then
            echo "⚠ Model directory not found at $ABSOLUTE_MODEL_PATH"
            echo "Listing available directories:"
            find MLProject/mlruns -type d -name "model" 2>/dev/null || echo "No model directories found"
            exit 1
          else
            echo "✓ Model found at $ABSOLUTE_MODEL_PATH"
            echo "Model contents:"
            ls -la "$ABSOLUTE_MODEL_PATH"
            
            echo ""
            echo "✓ Building Docker image..."
            
            # Build Docker image using absolute path
            mlflow models build-docker \
              -m "file://$ABSOLUTE_MODEL_PATH" \
              -n prediksi-penyakit-jantung:latest \
              --enable-mlserver

            echo "✓ Docker image built successfully"
            
            # List built images
            docker images | grep prediksi-penyakit-jantung
            
            # Push to Docker Hub if credentials are available
            if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
              echo "✓ Pushing to Docker Hub..."
              docker tag prediksi-penyakit-jantung:latest ${{ secrets.DOCKER_USERNAME }}/prediksi-penyakit-jantung:latest
              docker push ${{ secrets.DOCKER_USERNAME }}/prediksi-penyakit-jantung:latest
              echo "✓ Docker image pushed successfully"
            else
              echo "⚠ Docker Hub credentials not set, skipping push"
            fi
          fi
