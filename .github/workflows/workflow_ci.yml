name: Machine Learning Workflow CI

on:
  push:
    branches:
      - master

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy joblib matplotlib seaborn

      - name: Run MLflow Project
        run: |
          mlflow run . --env-manager=local
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Ambil RUN_ID terakhir dari MLflow (butuh query ke server/lokal)
          # Untuk simulasi, kita build dari folder model yang dihasilkan
          mlflow models build-docker -m "runs:/$(mlflow search-runs --experiment-names 'Heart Disease CI' --max-results 1 --output-mode csv | tail -n 1 | cut -d, -f1)/model" -n luhung004/heart-disease-model:latest
          docker push luhung004/heart-disease-model:latest
